<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    background-color: #003c6e;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    background: white;
    padding: 40px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

.container h2 {
    margin-bottom: 20px;
}

.input-group {
    margin-bottom: 15px;
    text-align: left;
}

.input-group label {
    font-size: 14px;
}

.input-group input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 8px;
    border: 1px solid #ccc;
    outline: none;
    transition: 0.3s;
}

.input-group input:focus {
    border-color: #00c6ff;
    box-shadow: 0 0 5px #00c6ff;
}

button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #003c6e;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
    text-decoration: none;
    
}

button:hover {
    background: #005f9e;
}

.error {
    color: red;
    font-size: 13px;
    margin-top: 10px;
}

.success {
    color: green;
    font-size: 14px;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">
    <h2>Sign In</h2>

    <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="Enter email">
    </div>

    <div class="input-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter password">
    </div>

    <button class="login" onclick="login()">Sign In</button>
    <button class="back"><a href="index.html">Back</a></button>
    <div id="message"></div>
</div>

<script>
function login() {
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let message = document.getElementById("message");

    // simple validation
    if (email === "" || password === "") {
        message.innerHTML = "<div class='error'>Please fill all fields</div>";
        return;
    }

    // fake login check
    if (email === "admin@gmail.com" && password === "123456") {
        message.innerHTML = "<div class='success'>Login successful!</div>";
    } else {
        message.innerHTML = "<div class='error'>Invalid email or password</div>";
    }
}

</script>

</body>
</html>
