<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess number</title>
</head>
<body>
    <style>
        body{
            background-color: #004176;
        }
        *{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        .button{
width: 150px;
height: 70px;
background-color: #0073d1;
color: aliceblue;
font-size: 29px;
border-radius: 4px;
cursor: pointer;
padding: 0 20px;
display: flex;
align-items: center;
justify-content: center;
transition: all 0.5s ease;
border:none;
}
        .button:hover{
            background-color: rgb(106, 0, 235);
            color:black;
}
.container {
display: flex;         
justify-content: center;  
gap: 50px;                  
margin-top: 50px; 
margin-left:-800px;        
}
.title{
    margin-top:100px;
    margin-left:100px;
}
    #result{
        font-size: 25px;
        width: 500px;
        margin-left:100px;
        font-size: 30px;
        color: rgb(0, 0, 0);
}

    </style>
<h1 class="title">Rock Paper Scissors Game</h1>

<div class="container">
<button class="button">rock</button>
<button class="button">paper</button>
<button class="button">scissor</button>
</div>


<h2 id="result"></h2>

    <script src="randomscript.js"></script>
</body>
</html>
